[platformio]
default_envs = teensy

[env]
framework = arduino
lib_deps =
    https://github.com/bakercp/PacketSerial.git

monitor_speed = 115200

[env:teensy]
platform = teensy
build_flags = -D TEENSY_OPT_SMALLEST_CODE
board = teensy41

[env:arduino_mega]
platform = atmelavr
board = megaatmega2560